# ==============================================================================
# CI/CD Pipeline — GitHub Actions → AWS ECR → EC2
# ==============================================================================
# Triggers on push to the main branch.
#
# Workflow:
#   1. Build the Docker image
#   2. Push it to AWS Elastic Container Registry (ECR)
#   3. SSH into the EC2 instance and redeploy the container
#
# Required GitHub Secrets:
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_REGION,
#   ECR_REPOSITORY, EC2_HOST, EC2_SSH_KEY,
#   OPENAI_API_KEY, PINECONE_API_KEY, PINECONE_INDEX_NAME
# ==============================================================================

name: Build & Deploy to AWS

on:
  push:
    branches: [main]

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # JOB 1: Build the Docker image and push to ECR
  # ─────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      # --- Checkout source code ---
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- Configure AWS credentials ---
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # --- Log in to Amazon ECR ---
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # --- Build, tag, and push the Docker image ---
      - name: Build, tag, and push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 2: Deploy the new image to the EC2 instance
  # ─────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      # --- Configure AWS credentials (for ECR login on EC2) ---
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # --- Get ECR registry URL ---
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # --- SSH into EC2 and redeploy ---
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Log in to ECR from the EC2 instance
            aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
              docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}

            # Stop and remove the existing container (if running)
            docker stop medical-chatbot || true
            docker rm medical-chatbot   || true

            # Pull the latest image
            docker pull ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest

            # Run the new container with environment variables
            docker run -d \
              --name medical-chatbot \
              -p 5000:5000 \
              -e OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }} \
              -e PINECONE_API_KEY=${{ secrets.PINECONE_API_KEY }} \
              -e PINECONE_INDEX_NAME=${{ secrets.PINECONE_INDEX_NAME }} \
              ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
